<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <title>商户数据汇总</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="resources/css/axure_rp_page.css" type="text/css" rel="stylesheet" />
    <link href="data/styles.css" type="text/css" rel="stylesheet" />
    <link href="custom/css/merchant-data-center.css" type="text/css" rel="stylesheet" />
    <script src="resources/scripts/jquery-3.7.1.min.js"></script>
    <script src="resources/scripts/axure/axQuery.js"></script>
    <script src="resources/scripts/axure/globals.js"></script>
    <script src="resources/scripts/axutils.js"></script>
    <script src="resources/scripts/axure/annotation.js"></script>
    <script src="resources/scripts/axure/axQuery.std.js"></script>
    <script src="resources/scripts/axure/doc.js"></script>
    <script src="resources/scripts/messagecenter.js"></script>
    <script src="resources/scripts/axure/events.js"></script>
    <script src="resources/scripts/axure/recording.js"></script>
    <script src="resources/scripts/axure/action.js"></script>
    <script src="resources/scripts/axure/expr.js"></script>
    <script src="resources/scripts/axure/geometry.js"></script>
    <script src="resources/scripts/axure/flyout.js"></script>
    <script src="resources/scripts/axure/model.js"></script>
    <script src="resources/scripts/axure/repeater.js"></script>
    <script src="resources/scripts/axure/sto.js"></script>
    <script src="resources/scripts/axure/utils.temp.js"></script>
    <script src="resources/scripts/axure/variables.js"></script>
    <script src="resources/scripts/axure/drag.js"></script>
    <script src="resources/scripts/axure/move.js"></script>
    <script src="resources/scripts/axure/visibility.js"></script>
    <script src="resources/scripts/axure/style.js"></script>
    <script src="resources/scripts/axure/adaptive.js"></script>
    <script src="resources/scripts/axure/tree.js"></script>
    <script src="resources/scripts/axure/init.temp.js"></script>
    <script src="resources/scripts/axure/legacy.js"></script>
    <script src="resources/scripts/axure/viewer.js"></script>
    <script src="resources/scripts/axure/math.js"></script>
    <script src="resources/scripts/axure/jquery.nicescroll.min.js"></script>
    <script src="data/document.js"></script>
    <script src="files/商户数据汇总/data.js"></script>
    <script type="text/javascript">
      $axure.utils.getTransparentGifPath = function() { return 'resources/images/transparent.gif'; };
      $axure.utils.getOtherPath = function() { return 'resources/Other.html'; };
      $axure.utils.getReloadPath = function() { return 'resources/reload.html'; };
    </script>
  </head>
  <body data-axure-page-id="merchant_data_summary">
    <div id="base">
      <main class="page-shell">
        <header class="page-header">
          <div class="title-group">
            <h1>商户数据汇总</h1>
            <p class="page-desc">说明：按自然月汇总 A 端核心经营数据，商户充值与用户充提分开查看，避免资金口径混在一起。</p>
          </div>
          <nav class="header-tabs">
            <a href="商户数据.html">商户数据</a>
            <a class="active" href="商户数据汇总.html">商户数据汇总</a>
          </nav>
        </header>

        <section class="metric-grid" aria-label="汇总指标">
          <div class="metric-card">
            <div class="metric-label"><span>商户充值(U)</span><span>A端入款</span></div>
            <div class="metric-value" id="metricMerchantRecharge">$0.00</div>
          </div>
          <div class="metric-card">
            <div class="metric-label"><span>用户充值</span><span>用户入款</span></div>
            <div class="metric-value" id="metricRecharge">$0.00</div>
          </div>
          <div class="metric-card">
            <div class="metric-label"><span>充提差</span><span>用户资金</span></div>
            <div class="metric-value" id="metricDiff">$0.00</div>
          </div>
          <div class="metric-card">
            <div class="metric-label"><span>总客损</span><span>月统计</span></div>
            <div class="metric-value" id="metricTotalLoss">$0.00</div>
          </div>
        </section>

        <section class="toolbar-panel" aria-label="筛选条件">
          <div class="filter-grid summary">
            <div class="field">
              <label for="filterMonthStart">开始月份</label>
              <input id="filterMonthStart" type="month" value="2026-05" />
            </div>
            <div class="field">
              <label for="filterMonthEnd">结束月份</label>
              <input id="filterMonthEnd" type="month" value="2026-05" />
            </div>
            <div class="field">
              <label for="filterMerchantId">商户ID</label>
              <input id="filterMerchantId" type="text" placeholder="请输入商户ID" />
            </div>
            <div class="button-row">
              <button class="btn" id="searchBtn" type="button">搜索</button>
              <button class="btn secondary" id="resetBtn" type="button">重置</button>
              <button class="btn export" id="exportBtn" type="button">导出报表</button>
            </div>
          </div>
        </section>

        <section class="section-panel" aria-label="商户月统计表">
          <div class="section-header">
            <div class="section-title">商户月统计</div>
            <div class="section-meta" id="tableCount">0 条月统计</div>
          </div>
          <div class="table-wrap">
            <table class="summary-table">
              <thead>
                <tr>
                  <th>月份</th>
                  <th>商户ID</th>
                  <th>商户名称</th>
                  <th>商户充值(U)</th>
                  <th>用户充值</th>
                  <th>提现金额</th>
                  <th>充提差</th>
                  <th>有效投注</th>
                  <th>投注人数</th>
                  <th>总客损</th>
                </tr>
              </thead>
              <tbody id="summaryTableBody"></tbody>
            </table>
          </div>
          <div class="pagination">
            <div id="paginationInfo">共 0 条月统计数据</div>
            <div class="pager-actions" id="paginationActions"></div>
          </div>
        </section>
      </main>
    </div>

    <script src="custom/js/merchant-data-summary.js"></script>
  </body>
</html>
